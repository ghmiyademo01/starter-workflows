# .github/workflows/deploy-aks-oidc.yml
# GitHub Actions → AKS へデプロイ（OIDC + Federated Credential 方式）
# 事前準備（Azure 側）：
#   1) 対象の Microsoft Entra アプリ/サービスプリンシパルに Federated Credential を追加
#      - Issuer:  https://token.actions.githubusercontent.com
#      - Subject: repo:ghmiyademo01/starter-workflows:ref:refs/heads/main
#      - Audience: api://AzureADTokenExchange
#   2) ロール割り当て
#      - ACR（レジストリ）: AcrPush
#      - AKS（クラスター）: Azure Kubernetes Service Cluster User Role（推奨）※admin kubeconfigは検証用途のみ
# 事前準備（GitHub 側）：
#   - リポジトリ Secrets に下記3つを登録（OIDCで使用）
#       AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
# 注意：
#   - ACR 名は **小文字のみ** 有効（例: myacr）。ログインサーバーは https:// なし（例: myacr.azurecr.io）。
#   - ACR を AKS に attach（az aks update --attach-acr）しておくと imagePullSecrets は不要。

name: Build and deploy to AKS (OIDC)

on:
  push:
    branches: [ main ]

# OIDC で必須
permissions:
  id-token: write
  contents: read

env:
  # ====== あなたの環境に合わせて設定 ======
  AZURE_CONTAINER_REGISTRY: gitHubTestContainer          # ACR 名（例: myacr）※実名に合わせる（小文字のみ）
  ACR_LOGIN_SERVER: gitHubTestContainer.azurecr.io       # 例: myacr.azurecr.io（https:// は付けない）
  PROJECT_NAME: default                                  # イメージ名/リポジトリ名
  RESOURCE_GROUP: testMiyaGroup
  CLUSTER_NAME: gitHubTest
  NAMESPACE: default                                     # デプロイ先 Namespace
  # 素のマニフェスト（Helm/Kustomize を使う場合は別ワークフローに）
  K8S_DEPLOYMENT: k8s/deployment.yaml
  K8S_SERVICE:    k8s/service.yaml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Azure へログイン（OIDC）---
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- ACR でコンテナイメージをビルド＆プッシュ（ACR Tasks）---
      - name: Build image on ACR
        uses: azure/CLI@v2
        with:
          azcliversion: 2.29.1
          inlineScript: |
            az acr build \
              -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}:${{ github.sha }} \
              -r ${{ env.AZURE_CONTAINER_REGISTRY }} \
              .

      # --- 非管理者ログイン用に kubelogin をセットアップ ---
      - name: Set up kubelogin for non-interactive auth
        uses: azure/use-kubelogin@v1.2
        with:
          kubelogin-version: 'latest'

      # --- AKS の kubeconfig を取得（非管理者での推奨パターン）---
      - name: Get AKS context (via kubelogin)
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          use-kubelogin: true

      # --- （任意）ACR を attach していない場合、imagePullSecret を事前作成する ---
      # - name: Create imagePullSecret (optional)
      #   uses: Azure/k8s-create-secret@v4
      #   with:
      #     namespace: ${{ env.NAMESPACE }}
      #     container-registry-url: ${{ env.ACR_LOGIN_SERVER }}
      #     container-registry-username: ${{ secrets.ACR_USERNAME }}
      #     container-registry-password: ${{ secrets.ACR_PASSWORD }}
      #     secret-name: ${{ env.PROJECT_NAME }}

      # --- デプロイ（素のマニフェストを適用、image タグを置換）---
      - name: Deploy to AKS
        uses: Azure/k8s-deploy@v5
        with:
          namespace: ${{ env.NAMESPACE }}
          manifests: |
            ${{ env.K8S_DEPLOYMENT }}
            ${{ env.K8S_SERVICE }}
          images: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}:${{ github.sha }}
          # imagepullsecrets: |             # imagePullSecret を使う場合のみ有効化
          #   ${{ env.PROJECT_NAME }}
