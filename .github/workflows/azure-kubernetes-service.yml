# .github/workflows/deploy-aks-sp.yml
# GitHub Actions → AKS へデプロイ（Service Principal シークレット方式）
# 必要な Secrets:
#   - AZURE_CREDENTIALS  … サービスプリンシパルの JSON（{ "clientId": "...", "clientSecret": "...", "subscriptionId": "...", "tenantId": "..." }）
#   - （任意）ACR_USERNAME / ACR_PASSWORD … imagePullSecret を作る場合に使用
# 注意:
#   - ACR 名（AZURE_CONTAINER_REGISTRY）は **小文字のみ** 有効（例: myacr）
#   - ACR のログインサーバー（ACR_LOGIN_SERVER）は `myacr.azurecr.io` の形式（https は付けない）

name: Build and deploy to AKS (SP secret)

on:
  push:
    branches: [ main ]

env:
  # ====== あなたの環境に合わせて設定 ======
  AZURE_CONTAINER_REGISTRY: gitHubTestContainer          # ACR 名（例: myacr）※小文字のみ
  ACR_LOGIN_SERVER: gitHubTestContainer.azurecr.io       # 例: myacr.azurecr.io
  PROJECT_NAME: default                                  # イメージ名/リポジトリ名（例: app）
  RESOURCE_GROUP: testMiyaGroup
  CLUSTER_NAME: gitHubTest
  NAMESPACE: default                                     # デプロイ先 Namespace
  # デプロイするマニフェスト（素の YAML 前提。Helm/Kustomize を使うなら別ワークフローに）
  K8S_DEPLOYMENT: k8s/deployment.yaml
  K8S_SERVICE:    k8s/service.yaml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Azure へログイン（Service Principal シークレット方式）---
      - name: Azure Login (Service Principal secret)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # --- ACR でコンテナイメージをビルド＆プッシュ（ACR Tasks）---
      - name: Build image on ACR
        uses: azure/CLI@v2
        with:
          azcliversion: 2.29.1
          inlineScript: |
            az acr build \
              -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}:${{ github.sha }} \
              -r ${{ env.AZURE_CONTAINER_REGISTRY }} \
              .

      # --- AKS の kubeconfig を取得 ---
      # セキュリティ観点では admin: true は推奨されません。検証が済んだら RBAC + use-kubelogin へ移行してください。
      - name: Get AKS context (admin temporary)
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          admin: true

      # --- （任意）プライベート ACR へ pull するための Secret を作成 ---
      # ACR を AKS に attach 済みなら imagePullSecret は不要です（推奨: az aks update --attach-acr）。
      # 未 attach かつマニフェストで imagePullSecrets を参照する場合のみ有効化してください。
      # - name: Create imagePullSecret (optional)
      #   uses: Azure/k8s-create-secret@v4
      #   with:
      #     namespace: ${{ env.NAMESPACE }}
      #     container-registry-url: ${{ env.ACR_LOGIN_SERVER }}
      #     container-registry-username: ${{ secrets.ACR_USERNAME }}
      #     container-registry-password: ${{ secrets.ACR_PASSWORD }}
      #     secret-name: ${{ env.PROJECT_NAME }}

      # --- デプロイ（素のマニフェストを適用、image タグを置換）---
      - name: Deploy to AKS
        uses: Azure/k8s-deploy@v5
        with:
          namespace: ${{ env.NAMESPACE }}
          manifests: |
            ${{ env.K8S_DEPLOYMENT }}
            ${{ env.K8S_SERVICE }}
          images: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.PROJECT_NAME }}:${{ github.sha }}
          # imagepullsecrets: |              # imagePullSecret を使う場合のみ有効化
